version: '3.8'

services:
  backend:
    build:
      context: ./herland-laundry-system-backend
      dockerfile: Dockerfile
    container_name: herland-backend
    ports:
      - "5000:5000"
    volumes:
      - ./herland-laundry-system-backend:/app
      - /app/node_modules
    env_file:
      - ./herland-laundry-system-backend/.env
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  frontend:
    build:
      context: ./herland-laundry-system-frontend
      dockerfile: Dockerfile
    container_name: herland-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./herland-laundry-system-frontend/client:/app
      - /app/node_modules
    env_file:
      - ./herland-laundry-system-frontend/client/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:5000/api/v1
    depends_on:
      - backend
    restart: unless-stopped
