# =============================================================
# Herland Laundry System — Docker Compose
# =============================================================
#
# USAGE:
#   Development (hot-reload):   docker compose --profile dev up --build
#   Production  (nginx + node): docker compose --profile prod up --build -d
#   Stop all:                   docker compose --profile dev --profile prod down
#
# EXPECTED OUTPUT (Development):
#   Backend:  "✅ Connection Successful! Database is talking to the Backend."
#             "🚀 Herland Backend running on http://localhost:5000"
#   Frontend: "VITE v5.x.x  ready in xxx ms"
#             "➜  Local:   http://localhost:5173/"
#
# =============================================================

# ---------------------------------------------------------------
# DEVELOPMENT PROFILE
# ---------------------------------------------------------------
# Uses Vite dev server + nodemon with live code syncing.
# Ideal for day-to-day coding on your local machine.
# ---------------------------------------------------------------

services:
  # ── Backend (Dev) ────────────────────────────────────────────
  backend-dev:
    build:
      context: ./herland-laundry-system-backend
      dockerfile: Dockerfile
      target: dev
    container_name: herland-backend-dev
    ports:
      - "5000:5000"
    volumes:
      - ./herland-laundry-system-backend:/app
      - /app/node_modules   # keep container's node_modules isolated
    env_file:
      - ./herland-laundry-system-backend/.env
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    profiles: ["dev"]

  # ── Frontend (Dev) ───────────────────────────────────────────
  frontend-dev:
    build:
      context: ./herland-laundry-system-frontend
      dockerfile: Dockerfile
      target: dev
    container_name: herland-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./herland-laundry-system-frontend/client:/app
      - /app/node_modules   # keep container's node_modules isolated
    env_file:
      - ./herland-laundry-system-frontend/client/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend-dev
    restart: unless-stopped
    profiles: ["dev"]

  # ---------------------------------------------------------------
  # PRODUCTION PROFILE
  # ---------------------------------------------------------------
  # Backend runs with plain Node (no nodemon).
  # Frontend is a compiled static bundle served by nginx.
  # This is what you would run on a VPS or hand off to a client.
  # ---------------------------------------------------------------

  # ── Backend (Production) ─────────────────────────────────────
  backend-prod:
    build:
      context: ./herland-laundry-system-backend
      dockerfile: Dockerfile
      target: production
    container_name: herland-backend-prod
    ports:
      - "5000:5000"
    env_file:
      - ./herland-laundry-system-backend/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    profiles: ["prod"]

  # ── Frontend (Production) ────────────────────────────────────
  frontend-prod:
    build:
      context: ./herland-laundry-system-frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api/v1}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY}
    container_name: herland-frontend-prod
    ports:
      - "80:80"
    depends_on:
      - backend-prod
    restart: unless-stopped
    profiles: ["prod"]
